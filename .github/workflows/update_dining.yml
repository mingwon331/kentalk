name: Update Dining Sheet

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"

jobs:
  update-dining:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dining updater
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          PTL_JSESSIONID: ${{ secrets.PTL_JSESSIONID }}
          ST_COOKIE: ${{ secrets.ST_COOKIE }}
        run: python update_dining_sheet.py
